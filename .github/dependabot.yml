version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    open-pull-requests-limit: 8
    target-branch: main
    schedule:
      interval: "cron"
      cronjob: "0 3 1,15 * *"
    cooldown:
      default-days: 7
  - package-ecosystem: npm
    directory: "/orchestration-stub"
    open-pull-requests-limit: 15
    groups:
      npm-babel-dependencies:
        patterns:
          - "@babel/*"
      npm-eslint-dependencies:
        patterns:
          - "*eslint*"
    ignore:
      - dependency-name: "@types/node"
        versions: [ "> 20" ]
      - dependency-name: "*"
        update-types:
          - "version-update:semver-patch"
    target-branch: main
    schedule:
      interval: "cron"
      cronjob: "0 3 1,15 * *"
    cooldown:
      default-days: 7
  - package-ecosystem: npm
    directory: "/ipv-stub"
    open-pull-requests-limit: 15
    groups:
      npm-eslint-dependencies:
        patterns:
          - "*eslint*"
      npm-aws-dependencies:
        patterns:
          - "@aws-sdk/*"
    ignore:
      - dependency-name: "@types/node"
        versions: [ "> 20" ]
      - dependency-name: "*"
        update-types:
          - "version-update:semver-patch"
    target-branch: main
    schedule:
      interval: "cron"
      cronjob: "0 3 1,15 * *"
    cooldown:
      default-days: 7
  - package-ecosystem: npm
    directory: "/amc-stub"
    open-pull-requests-limit: 15
    groups:
      npm-eslint-dependencies:
        patterns:
          - "*eslint*"
    ignore:
      - dependency-name: "@types/node"
        versions: [ "> 22" ]
      - dependency-name: "*"
        update-types:
          - "version-update:semver-patch"
    target-branch: main
    schedule:
      interval: "cron"
      cronjob: "0 3 1,15 * *"
    cooldown:
      default-days: 7
  - package-ecosystem: npm
    directory: "/notify-stub"
    open-pull-requests-limit: 15
    groups:
      npm-eslint-dependencies:
        patterns:
          - "*eslint*"
    ignore:
      - dependency-name: "@types/node"
        versions: [ "> 24" ]
      - dependency-name: "*"
        update-types:
          - "version-update:semver-patch"
    target-branch: main
    schedule:
      interval: "cron"
      cronjob: "0 3 1,15 * *"
    cooldown:
      default-days: 7