name: Build and deploy amc stub to Dev
run-name: Build and deploy amc stub to ${{ inputs.environment }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to run against"
        type: environment
        required: true

defaults:
  run:
    shell: bash
    working-directory: ./amc-stub

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up SAM cli
        uses: aws-actions/setup-sam@f664fad9e12492edfc187a31f575537dfbb0ff63 # v2
        with:
          use-installer: true  # this caches installation but is only available on Linux x86-64 runners

      - name: Set up AWS creds
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ secrets.AMC_STUB_GH_ACTIONS_ROLE_ARN }}
          aws-region: eu-west-2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22.12.0'

      - name: Install dependencies
        run: npm ci --ignore-scripts && echo "$PWD/node_modules/.bin" >> $GITHUB_PATH

      - name: CloudFormation lint
        run: |
          pip install cfn-lint
          cfn-lint template.yaml
      - name: SAM validate
        run: sam validate

      - name: SAM build and test
        run: sam build

      - name: Deploy SAM app
        uses: govuk-one-login/devplatform-upload-action@fda75612a1b0e5a8c84ae7c44a23340e50e5bbde # v3.11.0
        with:
          artifact-bucket-name: ${{ secrets.AMC_STUB_ARTIFACT_BUCKET_NAME }}
          signing-profile-name: ${{ secrets.AMC_STUB_SIGNING_PROFILE_NAME }}
          working-directory: ./amc-stub/.aws-sam/build
